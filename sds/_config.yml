#######################################################################################
# A default configuration that will be loaded for all jupyter books
# See the documentation for help and more options:
# https://jupyterbook.org/customize/config.html

#######################################################################################
# Book settings
title                       : "Superhero Data Science \n Probabilità e Statistica"  # The title of the book. Will be placed in the left navbar.
author                      : "<a href='https://malchiodi.di.unimi.it'>Dario Malchiodi</a> <a href='https://twitter.com/dariomalchiodi'>@dariomalchiodi</a>"  # The author of the book
copyright                   : "2021 — Licensed under CC-BY 4.0"  # Copyright year to be placed in the footer
logo                        : images/logoface.png  # A path to the book logo
exclude_patterns            : ["**.ipynb"]


# Force re-execution of notebooks on each build.
# See https://jupyterbook.org/content/execute.html
execute:
  execute_notebooks: auto

# Define the name of the latex output file for PDF builds
latex:
  latex_documents:
    targetname: book.tex

# Add a bibtex file so that we can create citations
bibtex_bibfiles:
  - references.bib

# Information about where the book exists on the web
repository:
  url: https://github.com/dariomalchiodi/sds  # Online location of your book
  path_to_book: sds  # Optional path to your book, relative to the repository root
  branch: main  # Which branch of the repository should be used when creating links (optional)

# Add GitHub buttons to your book
# See https://jupyterbook.org/customize/config.html#add-a-link-to-your-repository

launch_buttons:
  thebe: true
  notebook_interface: classic
  colab_url: "https://colab.research.google.com"
  binderhub_url             : https://mybinder.org  # The URL of the BinderHub (e.g., https://mybinder.org)
  jupyterhub_url            : ""  # The URL of the JupyterHub (e.g., https://datahub.berkeley.edu)
  thebe                     : false  # Add a thebe button to pages (requires the repository to run on Binder)
  colab_url                 : "" # The URL of Google Colab (https://colab.research.google.com)


parse:
    myst_enable_extensions:
      # don't forget to list any other extensions you want enabled,
      # including those that are enabled by default!
      - amsmath
      - dollarmath
      - html_image

html:
  home_page_in_navbar: true
  use_edit_page_button: true
  use_repository_button: true
  use_issues_button: true
  favicon: images/favicon.ico
  use_fullscreen_button: true
  comments:
    hypothesis: false

sphinx:
  config:
    language: it
    smartquotes: False
    bibtex_reference_style: author_year
    mathjax3_config:
      "HTML-CSS": {
        matchFontHeight: true,
        scale: 380
      }
  extra_extensions:
  - sphinx_proof
